version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: arlo-meeting-assistant-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: arlo
      MYSQL_PASSWORD: arlo
      MYSQL_DATABASE: meeting_assistant
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  # Redis (optional, for WebSocket scaling)
  redis:
    image: redis:7-alpine
    container_name: arlo-meeting-assistant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-redis

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arlo-meeting-assistant-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://arlo:arlo@mysql:3306/meeting_assistant
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev"

  # Frontend (Zoom App)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arlo-meeting-assistant-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:3000
      REACT_APP_WS_URL: ws://localhost:3000
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    stdin_open: true
    tty: true

  # RTMS Server (Zoom RTMS SDK)
  # NOTE: RTMS SDK requires x86_64/amd64 platform due to native dependencies
  # On Apple Silicon (M1/M2/M3), this will run in Rosetta emulation
  rtms:
    build:
      context: ./rtms
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    platform: linux/amd64
    container_name: arlo-meeting-assistant-rtms
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://arlo:arlo@mysql:3306/meeting_assistant
      BACKEND_URL: http://backend:3000
      # RTMS maps ZOOM_* → ZM_RTMS_* at startup (see rtms/src/index.js); no duplicate vars needed here.
      # ZOOM_CLIENT_ID, ZOOM_CLIENT_SECRET, and ZOOM_WEBHOOK_TOKEN come from env_file (.env)
      # RTMS SDK v1.0 logging (replaces configureLogger())
      ZM_RTMS_LOG_LEVEL: debug
      # Log level for PII gating
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Note: Port 3002 is NOT exposed to host — RTMS service is only accessible
    # from the Docker internal network via http://rtms:3002 (from backend)
    expose:
      - "3002"
    volumes:
      - ./rtms/src:/app/src
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started
    command: npm start

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
