version: 2
updates:
  # Backend dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "typescript"
    ignore:
      # Express 5 requires migration - ignore major bumps
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]

  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
    ignore:
      # React 19 requires migration - ignore major bumps
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # react-router-dom v7 has breaking changes
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      # lucide-react major versions often have breaking icon API changes
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]

  # RTMS service dependencies
  - package-ecosystem: "npm"
    directory: "/rtms"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    ignore:
      # Express 5 requires migration - ignore major bumps
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      # dotenv v17+ has breaking changes
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
